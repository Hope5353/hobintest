<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <!-- Deployment Trigger: 2026-06-07 01:00 -->
    <title>MyStocky | 주식 다마고치</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts for a cute vibe -->
    <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
</head>
<body class="mobile-first">
    <div class="app-container">
        <header class="game-header">
            <div class="status-bar">
                <span id="stock-name">새로운 친구를 영입하세요!</span>
                <span id="stock-level">Lv. 1</span>
            </div>
            <div class="stats">
                <div class="stat-item">💖 <span id="hp">100</span></div>
                <div class="stat-item">🍎 <span id="hunger">100</span></div>
                <div class="stat-item">💰 <span id="balance">0.0%</span></div>
            </div>
        </header>

        <main class="game-view">
            <div class="character-area">
                <div id="mystocky-character" class="character-idle">
                    <!-- Character SVG or Image will go here -->
                    <div class="character-placeholder">🥚</div>
                </div>
                <div class="speech-bubble" id="message">나만의 주식 다마고치를 키워보세요!</div>
            </div>
        </main>

        <nav class="action-menu">
            <button class="action-btn" id="btn-feed">
                <span class="icon">🍱</span>
                <span class="label">먹이주기</span>
            </button>
            <button class="action-btn" id="btn-play">
                <span class="icon">🎮</span>
                <span class="label">놀아주기</span>
            </button>
            <button class="action-btn" id="btn-clean">
                <span class="icon">🧹</span>
                <span class="label">청소하기</span>
            </button>
            <button class="action-btn secondary" id="btn-market">
                <span class="icon">🏪</span>
                <span class="label">거래소</span>
            </button>
        </nav>

        <!-- Market Modal -->
        <div id="market-modal" class="modal">
            <div class="modal-content">
                <h3>새 종목 입양하기</h3>
                <div id="market-list" class="market-grid"></div>
                <button class="close-modal">나중에 할게요</button>
            </div>
        </div>
    </div>

    <!-- Firebase App (the core Firebase SDK) is always required and must be listed first -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <!-- Add SDKs for Firebase products that you want to use -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    
    <script src="main.js"></script>
</body>
</html>
