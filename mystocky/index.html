<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MyStocky | 나의 주식 마을</title>
    <link rel="stylesheet" href="style.css?v=1.1">
    <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
</head>
<body class="mobile-first">
    <div class="app-container">
        <header class="game-header">
            <div class="status-bar">
                <span class="logo">🏘️ Stocky Village</span>
                <span id="village-stats">🏠 <span id="stocky-count">0</span> / 5</span>
            </div>
        </header>

        <main class="game-view" id="village">
            <!-- Stocky characters will be injected here -->
             <div id="empty-message" class="empty-msg">
                 <p>마을이 텅 비어있어요!<br>거래소에서 첫 Stocky를 데려오세요.</p>
             </div>
        </main>

        <nav class="action-menu">
            <button class="action-btn" id="btn-market">
                <span class="icon">🏪</span>
                <span class="label">거래소</span>
            </button>
            <button class="action-btn" id="btn-news-center">
                <span class="icon">🗞️</span>
                <span class="label">뉴스룸</span>
            </button>
            <button class="action-btn secondary" id="btn-save">
                <span class="icon">💾</span>
                <span class="label">마을저장</span>
            </button>
        </nav>

        <!-- Newsroom Modal -->
        <div id="news-modal" class="modal">
            <div class="modal-content" style="max-width: 450px;">
                <h3>🗞️ 스토키 뉴스룸</h3>
                <p style="font-size: 0.8rem; color: #666; margin-bottom: 15px;">우리 마을 친구들의 최신 소식이에요!</p>
                <div id="news-list" class="news-results">
                    <!-- News items will be injected here -->
                </div>
                <button class="close-modal">닫기</button>
            </div>
        </div>

        <!-- Market Modal (Search) -->
        <div id="market-modal" class="modal">
            <div class="modal-content">
                <h3>새 Stocky 영입</h3>
                <div class="search-wrapper">
                    <input type="text" id="market-search" placeholder="종목명 또는 티커 (예: 삼성전자, NVDA)">
                    <button id="btn-search-trigger">검색</button>
                </div>
                <div id="market-list" class="search-results"></div>
                <button class="close-modal">닫기</button>
            </div>
        </div>

        <!-- Naming & Character Selection Modal -->
        <div id="naming-modal" class="modal">
            <div class="modal-content">
                <h3 id="naming-title">Stocky 입양하기</h3>
                <p style="font-size: 0.8rem; color: #666; margin-bottom: 10px;">마음에 드는 스토키를 선택해 주세요!</p>
                
                <div class="candidate-selector" id="candidate-container">
                    <!-- 3 random candidates will be injected here -->
                </div>

                <p id="naming-ticker-info" style="font-weight: bold; margin-top: 15px;"></p>
                
                <div class="naming-wrapper">
                    <input type="text" id="naming-input" placeholder="스토키의 이름을 지어주세요!">
                </div>
                
                <button id="btn-adopt-confirm" class="confirm-btn">이 마을에 데려오기</button>
                <button class="close-modal">취소</button>
            </div>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <script src="main.js?v=1.1"></script>
</body>
</html>
