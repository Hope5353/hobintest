<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>가영아밥먹자 | 그녀를 위한 맛있는 솔루션</title>
    <link rel="stylesheet" href="style.css?v=1.1">
    <link href="https://fonts.googleapis.com/css2?family=Jua&family=Pretendard:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body class="mobile-only">
    <div class="app-wrapper">
        <header class="header">
            <h1>가영아밥먹자 💝</h1>
            <p>가영이의 기분에 딱 맞는 메뉴를 골라줄게</p>
        </header>

        <main class="main-content">
            <section id="mood-selection" class="step">
                <div class="step-title">1. 기분 상태를 선택하세요</div>
                <div class="mood-grid">
                    <button class="mood-btn" data-mood="angry">
                        <span class="emoji">😡</span>
                        <span class="label">화가 났다</span>
                    </button>
                    <button class="mood-btn" data-mood="sad">
                        <span class="emoji">😢</span>
                        <span class="label">서운하다</span>
                    </button>
                    <button class="mood-btn" data-mood="tired">
                        <span class="emoji">😴</span>
                        <span class="label">지쳤다</span>
                    </button>
                    <button class="mood-btn" data-mood="happy">
                        <span class="emoji">🥰</span>
                        <span class="label">매우 행복</span>
                    </button>
                    <button class="mood-btn" data-mood="stress">
                        <span class="emoji">🤯</span>
                        <span class="label">스트레스</span>
                    </button>
                    <button class="mood-btn" data-mood="unknown">
                        <span class="emoji">🤔</span>
                        <span class="label">알 수 없음</span>
                    </button>
                </div>
            </section>

            <section id="result-area" class="step hidden">
                <div class="step-title">2. 맞춤 추천 음식</div>
                <div id="food-card" class="food-card">
                    <!-- Recommended food will be injected here -->
                </div>
                
                <div class="order-links">
                    <a href="#" id="link-baemin" class="order-btn baemin">배달의민족에서 찾기</a>
                    <a href="#" id="link-coupang" class="order-btn coupang">쿠팡이츠에서 찾기</a>
                </div>
                
                <button id="btn-reset" class="reset-btn">처음으로</button>
            </section>
        </main>

        <footer class="footer">
            <p>© 2026 MoodFood - 사랑받는 남친의 필수 앱</p>
        </footer>
    </div>

    <script src="main.js"></script>
</body>
</html>
