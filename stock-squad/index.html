<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STOCK SQUAD | 전략적 주식 드림팀</title>
    <!-- Cache busting with version query -->
    <link rel="stylesheet" href="style.css?v=1.4">
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap" rel="stylesheet">
    
    <!-- Google AdSense -->
    <meta name="google-adsense-account" content="ca-pub-7722735349463695">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7722735349463695"
     crossorigin="anonymous"></script>
</head>
<body class="gaming-theme">
    <div class="overlay"></div>
    <div class="app-wrapper">
        <header class="main-nav">
            <div class="logo-area">
                <span class="icon">🏆</span>
                <div class="logo-text">
                    <h1 class="glitch-text" data-text="STOCK SQUAD">STOCK SQUAD</h1>
                    <span class="tagline">MANAGEMENT & ANALYSIS</span>
                </div>
            </div>
            <div class="top-controls">
                <div class="strategy-badge" id="current-strategy">분석 중</div>
                <div class="formation-selector">
                    <label>FORMATION</label>
                    <select id="formation-select">
                        <option value="4-4-2">4-4-2</option>
                        <option value="4-3-3" selected>4-3-3</option>
                        <option value="3-5-2">3-5-2</option>
                        <option value="4-2-3-1">4-2-3-1</option>
                        <option value="3-4-3">3-4-3</option>
                        <option value="5-3-2">5-3-2</option>
                        <option value="5-4-1">5-4-1</option>
                    </select>
                </div>
                <div class="action-btns">
                    <button id="save-btn" class="save-btn" title="스쿼드 저장">SAVE</button>
                    <button id="load-btn" class="load-btn" title="스쿼드 불러오기">LOAD</button>
                    <button id="share-btn" class="share-btn" title="친구에게 공유">SHARE</button>
                    <a href="../index.html" class="exit-btn">EXIT</a>
                </div>
            </div>
        </header>

        <main class="stadium-layout">
            <div class="pitch-container">
                <!-- Top Ad Slot -->
                <div class="ad-container">
                    <ins class="adsbygoogle"
                         style="display:block"
                         data-ad-client="ca-pub-7722735349463695"
                         data-ad-slot="auto"
                         data-ad-format="auto"
                         data-full-width-responsive="true"></ins>
                    <script> (adsbygoogle = window.adsbygoogle || []).push({}); </script>
                </div>

                <div class="pitch">
                    <div id="squad-field" class="players-overlay">
                        <!-- Player cards will be rendered here dynamically -->
                    </div>
                </div>
                
                <div class="coach-advice-panel">
                    <div class="coach-header">
                        <span class="coach-icon">👨‍🏫</span>
                        <h3>COACH ADVICE</h3>
                    </div>
                    <div id="coach-message" class="coach-content">
                        포트폴리오를 분석 중입니다. 선수를 영입해 주세요!
                    </div>
                    <div id="recommendation-area" class="rec-list">
                        <!-- Recommendations will appear here -->
                    </div>
                </div>
            </div>

            <aside class="transfer-market">
                <div class="market-header">
                    <h2>TRANSFER MARKET</h2>
                    <div class="search-input-wrapper">
                        <input type="text" id="market-search" placeholder="종목명 또는 티커 검색...">
                        <span class="search-icon">🔍</span>
                    </div>
                </div>
                
                <div id="market-list" class="stock-grid">
                    <!-- Stock items will appear here -->
                </div>

                <div class="my-roster-section">
                    <h3>MY ROSTER (영입 목록)</h3>
                    <div id="my-roster-list" class="roster-grid">
                        <!-- My picked stocks will appear here -->
                    </div>
                </div>

                <div class="squad-stats">
                    <h3>SQUAD PERFORMANCE</h3>
                    
                    <div class="total-score-container">
                        <label>SQUAD OVERALL (OVR)</label>
                        <span id="squad-ovr" class="ovr-value">0</span>
                    </div>

                    <div class="stat-bars">
                        <div class="stat-item">
                            <label>공격력 (레버리지/성장성)</label>
                            <div class="bar-bg"><div id="stat-atk" class="bar-fill" style="width: 0%"></div></div>
                        </div>
                        <div class="stat-item">
                            <label>조직력 (안정성)</label>
                            <div class="bar-bg"><div id="stat-link" class="bar-fill" style="width: 0%"></div></div>
                        </div>
                        <div class="stat-item">
                            <label>수비력 (배당/현금흐름)</label>
                            <div class="bar-bg"><div id="stat-def" class="bar-fill" style="width: 0%"></div></div>
                        </div>
                    </div>
                    <div class="squad-summary-grid">
                        <div class="summary-item">
                            <label>AVG BETA</label>
                            <span id="avg-beta">0.00</span>
                        </div>
                        <div class="summary-item">
                            <label>AVG YIELD</label>
                            <span id="avg-yield">0.0%</span>
                        </div>
                    </div>
                </div>

                <!-- Bottom Ad Slot in Sidebar -->
                <div class="ad-container" style="margin-top:20px;">
                    <ins class="adsbygoogle"
                         style="display:block"
                         data-ad-client="ca-pub-7722735349463695"
                         data-ad-slot="auto"
                         data-ad-format="auto"
                         data-full-width-responsive="true"></ins>
                    <script> (adsbygoogle = window.adsbygoogle || []).push({}); </script>
                </div>
            </aside>
        </main>
    </div>

    <!-- Player Selection Modal -->
    <div id="selection-modal" class="modal">
        <div class="modal-content">
            <h3 id="modal-title">영입 가능한 선수 목록</h3>
            <div id="modal-market-list" class="stock-grid" style="max-height: 60vh; overflow-y: auto; margin-top: 15px;"></div>
            <button class="close-modal">닫기</button>
        </div>
    </div>

    <script src="main.js?v=1.4"></script>
</body>
</html>
