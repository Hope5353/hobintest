<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이용약관 | 나만의 반려동물 찾기</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .policy-content {
            text-align: left;
            line-height: 1.8;
            max-height: 500px;
            overflow-y: auto;
            padding-right: 15px;
            margin-bottom: 20px;
        }
        .policy-content h3 { margin-top: 20px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <section class="card">
            <h1 class="title">이용약관</h1>
            <div class="policy-content">
                <h3>제1조 (목적)</h3>
                <p>본 약관은 '나만의 반려동물 찾기'가 제공하는 서비스의 이용 조건 및 절차에 관한 사항을 규정함을 목적으로 합니다.</p>
                
                <h3>제2조 (서비스의 내용)</h3>
                <p>본 사이트는 사용자 성향에 맞는 반려동물을 추천해주는 퀴즈 서비스를 제공합니다. 추천 결과는 참고용이며 실제 입양 시 전문가의 상담이 필요합니다.</p>
                
                <h3>제3조 (책임의 한계)</h3>
                <p>본 사이트에서 제공하는 정보의 정확성에 대해 최선을 다하지만, 이용자가 서비스를 통해 얻은 정보로 인해 발생하는 결과에 대해서는 책임을 지지 않습니다.</p>
            </div>
            <button class="main-btn" onclick="location.href='index.html'">홈으로 돌아가기</button>
        </section>
    </div>
</body>
</html>
