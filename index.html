<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나만의 반려동물 찾기 | 성향 맞춤 추천</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- Home Screen -->
        <section id="home" class="card">
            <h1 class="title">🐶 나에게 딱 맞는 <br>반려동물은 누구일까요? 🐱</h1>
            <p class="subtitle">몇 가지 질문을 통해 당신의 성향과 라이프스타일에 <br>가장 잘 어울리는 강아지와 고양이를 추천해 드립니다.</p>
            <button class="main-btn" onclick="startQuiz()">테스트 시작하기</button>
        </section>

        <!-- Quiz Screen -->
        <section id="quiz" class="card" style="display: none;">
            <div class="progress-container">
                <div id="progress" class="progress-bar"></div>
            </div>
            <div id="quiz-container">
                <!-- Questions will be injected here -->
            </div>
        </section>

        <!-- Results Screen -->
        <section id="results" class="card" style="display: none;">
            <h2 class="result-title">✨ 당신을 위한 최고의 파트너 ✨</h2>
            <div class="result-grid">
                <div id="dog-result" class="result-item"></div>
                <div id="cat-result" class="result-item"></div>
            </div>
            <button class="retry-btn" onclick="restartQuiz()">다시 테스트하기</button>
        </section>
    </div>

    <script src="main.js"></script>
</body>
</html>
