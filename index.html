<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>괜찮아, 밥먹자 💝 | 널 위한 맞춤 메뉴 추천</title>
    <link rel="stylesheet" href="style.css?v=1.7">
    <link href="https://fonts.googleapis.com/css2?family=Jua&family=Pretendard:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body class="mobile-only">
    <div class="app-wrapper">
        <header class="header">
            <div class="mode-switcher">
                <button id="btn-nurse-mode" class="nurse-btn-link">🚑 간호사 버전</button>
            </div>
            <h1 id="app-title">괜찮아, 밥먹자 💝</h1>
            <p id="header-subtitle">오늘 너의 컨디션에 딱 맞는 메뉴를 골라줄게</p>
        </header>

        <main class="main-content">
            <!-- Progress Bar -->
            <div id="survey-progress-container" class="hidden">
                <div class="progress-info">
                    <span id="progress-text">분석 중...</span>
                </div>
                <div class="progress-bar-bg">
                    <div id="progress-bar-fill" class="progress-bar-fill" style="width: 0%;"></div>
                </div>
            </div>

            <!-- Start Screen -->
            <section id="start-screen" class="step">
                <div class="welcome-card">
                    <span class="welcome-emoji" id="welcome-emoji">🍱</span>
                    <h2 id="welcome-title">오늘 하루 어땠어?</h2>
                    <p id="welcome-desc">지금 너의 마음을 가장 잘 알아주는<br>맛있는 메뉴 3가지를 골라줄게!</p>
                    <button id="btn-start-survey" class="start-btn">내 기분 파악하기</button>
                </div>
            </section>

            <!-- Survey Section -->
            <section id="survey-area" class="step hidden">
                <div id="question-card" class="question-card">
                    <h3 id="question-text">로딩 중...</h3>
                    <div id="answer-buttons" class="answer-grid">
                        <!-- Buttons injected by JS -->
                    </div>
                </div>
            </section>

            <!-- Result Section -->
            <section id="result-area" class="step hidden">
                <div class="step-title" id="result-title">지금 이런 음식이 필요해!</div>
                <div id="status-summary-box" class="status-summary-box">
                    <!-- Final one-line summary generated by JS -->
                </div>
                
                <div id="results-container" class="results-container">
                    <!-- 3 Result Cards -->
                </div>
                
                <button id="btn-reset" class="reset-btn">다시 파악하기</button>
            </section>
        </main>

        <footer class="footer">
            <p>© 2026 괜찮아, 밥먹자 - 사랑을 담아 만든 코드</p>
        </footer>
    </div>

    <script src="main.js?v=1.7"></script>
</body>
</html>
