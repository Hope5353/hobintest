<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나만의 반려동물 찾기 | 성향 맞춤 추천</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7722735349463695"
     crossorigin="anonymous"></script>
</head>
<body>
    <div class="container">
        <!-- Home Screen -->
        <section id="home" class="card">
            <h1 class="title">🐶 나에게 딱 맞는 <br>반려동물은 누구일까요? 🐱</h1>
            <p class="subtitle">몇 가지 질문을 통해 당신의 성향과 라이프스타일에 <br>가장 잘 어울리는 강아지와 고양이를 추천해 드립니다.</p>
            <button class="main-btn" onclick="startQuiz()">테스트 시작하기</button>
            <p class="inquiry-link" onclick="showInquiry()">제휴 및 협업 문의하기</p>
        </section>

        <!-- Quiz Screen -->
        <section id="quiz" class="card" style="display: none;">
            <div class="progress-container">
                <div id="progress" class="progress-bar"></div>
            </div>
            <div id="quiz-container">
                <!-- Questions will be injected here -->
            </div>
        </section>

        <!-- Results Screen -->
        <section id="results" class="card" style="display: none;">
            <h2 class="result-title">✨ 당신을 위한 최고의 파트너 ✨</h2>
            <div class="result-grid">
                <div id="dog-result" class="result-item"></div>
                <div id="cat-result" class="result-item"></div>
            </div>
            <button class="retry-btn" onclick="restartQuiz()">다시 테스트하기</button>
            <p class="inquiry-link" onclick="showInquiry()">제휴 및 협업 문의하기</p>
        </section>

        <!-- Inquiry Screen -->
        <section id="inquiry" class="card" style="display: none;">
            <h2 class="title">🤝 제휴 및 협업 문의</h2>
            <p class="subtitle">함께 성장할 파트너를 기다립니다. <br>내용을 남겨주시면 담당자가 연락드리겠습니다.</p>
            
            <form action="https://formspree.io/f/xvznpbvk" method="POST" class="inquiry-form">
                <div class="form-group">
                    <label for="name">성함/담당자명</label>
                    <input type="text" id="name" name="name" required placeholder="홍길동">
                </div>
                <div class="form-group">
                    <label for="email">이메일 주소</label>
                    <input type="email" id="email" name="_replyto" required placeholder="example@email.com">
                </div>
                <div class="form-group">
                    <label for="company">회사명/단체명</label>
                    <input type="text" id="company" name="company" placeholder="회사명 (선택)">
                </div>
                <div class="form-group">
                    <label for="message">문의 내용</label>
                    <textarea id="message" name="message" required placeholder="문의하실 내용을 입력해주세요." rows="5"></textarea>
                </div>
                <button type="submit" class="main-btn">문의 보내기</button>
            </form>
            <button class="back-btn" onclick="goHome()">뒤로 가기</button>
        </section>

        <!-- Comments Section -->
        <section class="card comment-section">
            <div id="disqus_thread"></div>
            <script>
                (function() { // DON'T EDIT BELOW THIS LINE
                var d = document, s = d.createElement('script');
                s.src = 'https://hobintestproduct.disqus.com/embed.js';
                s.setAttribute('data-timestamp', +new Date());
                (d.head || d.body).appendChild(s);
                })();
            </script>
            <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
        </section>
    </div>

    <script src="main.js"></script>
</body>
</html>
