<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>괜찮아, 밥먹자 🏥💝 | 널스라이프 맞춤 기분 분석</title>
    <link rel="stylesheet" href="style.css?v=1.6">
    <link href="https://fonts.googleapis.com/css2?family=Jua&family=Pretendard:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body class="mobile-only">
    <div class="app-wrapper">
        <header class="header">
            <h1>괜찮아, 밥먹자 🏥💝</h1>
            <p id="header-subtitle">오늘 고생한 당신을 위한 맞춤 메뉴를 골라줄게</p>
        </header>

        <main class="main-content">
            <!-- Progress Bar -->
            <div id="survey-progress-container" class="hidden">
                <div class="progress-info">
                    <span id="progress-text">컨디션 파악 중...</span>
                </div>
                <div class="progress-bar-bg">
                    <div id="progress-bar-fill" class="progress-bar-fill" style="width: 0%;"></div>
                </div>
            </div>

            <!-- Start Screen -->
            <section id="start-screen" class="step">
                <div class="welcome-card">
                    <span class="welcome-emoji">🍱</span>
                    <h2>오늘도 고생 많았어! 🩺</h2>
                    <p>병원에서의 힘든 시간은 잠시 잊어보자.<br>가장 힘이 될 메뉴 3개를 골라줄게!</p>
                    <button id="btn-start-survey" class="start-btn">내 기분 파악하기</button>
                </div>
            </section>

            <!-- Survey Section -->
            <section id="survey-area" class="step hidden">
                <div id="question-card" class="question-card">
                    <h3 id="question-text">로딩 중...</h3>
                    <div id="answer-buttons" class="answer-grid">
                        <!-- Buttons injected by JS -->
                    </div>
                </div>
            </section>

            <!-- Result Section -->
            <section id="result-area" class="step hidden">
                <div class="step-title">정성껏 골라봤어! ✨</div>
                <p id="result-summary" style="text-align:center; font-size:0.9rem; color:#444; margin-bottom:20px; line-height:1.5; background:#fff; padding:15px; border-radius:20px; border:2px solid var(--primary); font-weight:700;">
                    <!-- Final summary -->
                </p>
                
                <div id="results-container" class="results-container">
                    <!-- 3 Result Cards -->
                </div>
                
                <button id="btn-reset" class="reset-btn">다시 파악하기</button>
            </section>
        </main>

        <footer class="footer">
            <p>© 2026 괜찮아, 밥먹자 - 간호사 커플을 위한 힐링 코드</p>
        </footer>
    </div>

    <script src="main.js?v=1.6"></script>
</body>
</html>
