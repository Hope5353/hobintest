<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>괜찮아, 밥먹자 🏥💝 | 간호사 맞춤 기분 분석</title>
    
    <!-- Google AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7722735349463695" crossorigin="anonymous"></script>
    <meta name="google-adsense-account" content="ca-pub-7722735349463695">

    <!-- Open Graph Meta Tags for KakaoTalk/Social Sharing -->
    <meta property="og:title" content="괜찮아, 밥먹자 🏥💝">
    <meta property="og:description" content="지친 당신의 마음을 읽고, 지금 가장 필요한 위로의 한 끼를 추천해드려요.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://mygirlfriendfood.pages.dev/">
    <meta property="og:image" content="https://images.unsplash.com/photo-1621310158204-62967f8a7e08?q=80&w=800">

    <!-- Cache busting with v=5.0 -->
    <link rel="stylesheet" href="style.css?v=5.0">
    <link href="https://fonts.googleapis.com/css2?family=Jua&family=Pretendard:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body class="mobile-only">
    <div class="app-wrapper">
        <header class="header">
            <h1 id="app-title">괜찮아, 밥먹자 🏥💝</h1>
            <p id="header-subtitle">오늘 당신의 컨디션에 딱 맞는 메뉴를 골라줄게</p>
        </header>

        <main class="main-content">
            <!-- Progress Bar -->
            <div id="survey-progress-container" class="hidden">
                <div class="progress-info">
                    <span id="progress-text">컨디션 파악 중...</span>
                </div>
                <div class="progress-bar-bg">
                    <div id="progress-bar-fill" class="progress-bar-fill" style="width: 0%;"></div>
                </div>
            </div>

            <!-- Start Screen -->
            <section id="start-screen" class="step">
                <div class="welcome-card">
                    <span class="welcome-emoji">🍱</span>
                    <h2>오늘도 고생 많았어! 🩺</h2>
                    <p>오늘 하루 네 마음이 어땠는지 천천히 들려줘.<br>너의 감정을 읽고, 지금 가장 완벽한 위로가 될 메뉴를 골라줄게.</p>
                    <button id="btn-start-survey" class="start-btn">내 마음 들여다보기</button>
                    <button id="btn-share-app" class="share-app-btn">🔗 친구에게 공유하기</button>
                </div>
            </section>

            <!-- Survey Section -->
            <section id="survey-area" class="step hidden">
                <div id="question-card" class="question-card">
                    <div class="survey-header">
                        <button id="btn-prev" class="prev-btn">← 뒤로</button>
                    </div>
                    <h3 id="question-text">로딩 중...</h3>
                    <div id="answer-buttons" class="answer-grid">
                        <!-- Buttons injected by JS -->
                    </div>
                </div>
            </section>

            <!-- Result Section -->
            <section id="result-area" class="step hidden">
                <div class="step-title" id="result-title">지금 이런 음식이 필요해! ✨</div>
                <div id="status-summary-box" class="status-summary-box">
                    <!-- Final summary generated by JS -->
                </div>
                
                <div id="results-container" class="results-container">
                    <!-- 3 Result Cards -->
                </div>
                
                <button id="btn-reset" class="reset-btn">다시 파악하기</button>
            </section>
        </main>

        <footer class="footer">
            <p>© 2026 괜찮아, 밥먹자 - 간호사 커플을 위한 힐링 코드</p>
        </footer>
    </div>

    <script src="main.js?v=4.0"></script>
</body>
</html>
